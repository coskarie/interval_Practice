<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>음정 퀴즈 사이트</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        canvas { background-color: white; border: 1px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>음정 맞히기 퀴즈</h1>
    <canvas id="staffCanvas" width="500" height="200"></canvas>
    
    <div class="controls">
        <button onclick="drawNote()">새 문제 생성</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
