<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음정 퀴즈 사이트</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f8f9fa; padding: 40px; }
        canvas { background: white; border: 2px solid #333; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .container { margin-top: 30px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input { padding: 12px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 18px; width: 150px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #3498db; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; margin: 0 5px; transition: 0.2s; }
        .btn-check { background-color: #2ecc71; color: white; }
        .btn-next { background-color: #3498db; color: white; }
        button:hover { opacity: 0.8; }
        #resultMessage { height: 30px; font-size: 20px; font-weight: bold; margin-top: 20px; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
    </style>
</head>
<body>
    <h2>음정 맞히기 (Interval Quiz)</h2>
    <canvas id="staffCanvas" width="500" height="200"></canvas>
    
    <div class="container">
        <div class="input-group">
            <input type="text" id="answerInput" placeholder="예: 장3도" autocomplete="off">
        </div>
        <button class="btn-check" onclick="checkAnswer()">정답 확인</button>
        <button class="btn-next" onclick="nextQuestion()">다음 문제</button>
        <div id="resultMessage"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
