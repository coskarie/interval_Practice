<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음정 퀴즈 연습</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; padding: 20px; }
        canvas { background-color: white; border: 2px solid #333; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; width: 120px; }
        button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        #resultMessage { font-size: 18px; font-weight: bold; height: 24px; color: #34495e; }
        .guide { color: #7f8c8d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>음정 맞히기 퀴즈</h1>
    <canvas id="staffCanvas" width="500" height="200"></canvas>
    
    <div class="controls">
        <input type="text" id="answerInput" placeholder="예: 장3도" onkeypress="if(event.keyCode==13) checkAnswer()">
        <button onclick="checkAnswer()">정답 확인</button>
        <button onclick="nextQuestion()" style="background-color: #3498db;">다음 문제</button>
    </div>
    <p id="resultMessage"></p>
    <p class="guide">팁: '장2도', '단3도', '완전5도' 형식으로 입력하세요.</p>

    <script src="script.js"></script>
</body>
</html>
